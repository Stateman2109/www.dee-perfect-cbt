<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exam Page</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <h2>Exam Questions</h2>

    <!-- <div id="questions-container"></div> -->
    <div id="questions-container">Loading questions...</div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // 1. Get selected exam data
        const examData = JSON.parse(localStorage.getItem("examData"));

        if (!examData) {
          alert("No exam selected");
          window.location.href = "exam-setup.html";
          return;
        }

        console.log("Exam Data:", examData);

        try {
          // 2. Fetch questions from your API
          const res = await fetch(
            `https://the-trivia-api.com/v2/questions?limit=10`,
          );

          const data = await res.json();

          displayQuestions(data);
        } catch (error) {
          console.error("Error fetching questions:", error);
        }
      });

      // 3. Display questions
      function displayQuestions(questions) {
        const container = document.getElementById("questions-container");

        if (!container) {
          console.error("Container not found");
          return;
        }

        container.innerHTML = "";

        if (!questions || questions.length === 0) {
          container.innerHTML = "<p>No questions found</p>";
          return;
        }

        questions.forEach((q, index) => {
          let options = q.options;

          // ✅ Handle if options is string
          if (typeof options === "string") {
            try {
              options = JSON.parse(options);
            } catch (e) {
              console.error("Invalid options JSON", options);
              options = {};
            }
          }

          container.innerHTML += `
      <div>
        <h3>${index + 1}. ${q.question || "No question text"}</h3>
        <p>A. ${options?.A || ""}</p>
        <p>B. ${options?.B || ""}</p>
        <p>C. ${options?.C || ""}</p>
        <p>D. ${options?.D || ""}</p>
      </div>
    `;
        });
      }
    </script>
    <script>
      const examData = JSON.parse(localStorage.getItem("examData"));

      console.log("Received examData:", examData);
    </script>
    <script>
      async function loadQuestions() {
        const examData = JSON.parse(localStorage.getItem("examData"));

        console.log("Exam Data:", examData);

        const url = `https://the-trivia-api.com/v2/questions?limit=30`;

        try {
          const res = await fetch(url);
          const data = await res.json();

          console.log("Questions:", data);

          displayQuestions(data);
        } catch (err) {
          console.error("Error fetching questions:", err);
        }
      }

      function displayQuestions(questions) {
        const container = document.getElementById("questions-container");

        container.innerHTML = "";

        questions.forEach((q, index) => {
          const options = [...q.incorrectAnswers, q.correctAnswer];

          const div = document.createElement("div");

          div.innerHTML = `
        <h3>Q${index + 1}: ${q.question.text}</h3>
        <ul>
          ${options.map((opt) => `<li>${opt}</li>`).join("")}
        </ul>
      `;

          container.appendChild(div);
        });
      }

      window.onload = loadQuestions;
      async function loadQuestions() {
        const examData = JSON.parse(localStorage.getItem("examData"));

        console.log("Exam Data:", examData);

        // 1. Get Supabase questions
        let localQuestions = [];
        try {
          const { data, error } = await supabase
            .from("questions")
            .select("*")
            .eq("subject", examData.subject)
            .eq("year", examData.year);

          if (!error) {
            localQuestions = data;
          }
        } catch (err) {
          console.log("Supabase error:", err);
        }

        // 2. Get API questions (fallback)
        let apiQuestions = [];
        try {
          const res = await fetch(
            `https://the-trivia-api.com/v2/questions?limit=30`,
          );
          apiQuestions = await res.json();
        } catch (err) {
          console.log("API error:", err);
        }

        // 3. Merge both
        const allQuestions = [...localQuestions, ...apiQuestions];

        console.log("Final Questions:", allQuestions);

        displayQuestions(allQuestions);
      }
    </script>

    <script>
      async function loadQuestions() {
        const examData = JSON.parse(localStorage.getItem("examData"));

        console.log("Exam Data:", examData);

        // 1. Get Supabase questions
        let localQuestions = [];
        try {
          const { data, error } = await supabase
            .from("questions")
            .select("*")
            .eq("subject", examData.subject)
            .eq("year", examData.year);

          if (!error) {
            localQuestions = data;
          }

          console.log("Supabase result:", localQuestions);
        } catch (err) {
          console.log("Supabase error:", err);
        }
      }
    </script>

    <script src="./scripts/supabase.min.js"></script>
    <script src="./scripts/site.js"></script>
  </body>
</html>
