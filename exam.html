<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CBT Exam</title>

    <script src="./scripts/supabase.min.js"></script>

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
        padding: 0;
      }

      .header {
        background: #020617;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
      }

      .timer-bar {
        text-align: center;
        padding: 10px;
        background: #1e293b;
      }

      .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
      }

      .card {
        background: #1e293b;
        padding: 20px;
        border-radius: 10px;
      }

      .question {
        font-size: 18px;
        margin-bottom: 15px;
      }

      .option {
        display: block;
        background: #334155;
        padding: 12px;
        margin: 8px 0;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
      }

      .option:hover {
        background: #475569;
      }

      input[type="radio"] {
        margin-right: 10px;
      }

      .nav-grid {
        margin-bottom: 15px;
      }

      .nav-grid button {
        padding: 6px 10px;
        margin: 3px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      .controls {
        margin-top: 15px;
      }

      button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #22c55e;
        color: white;
      }

      button:hover {
        opacity: 0.85;
      }

      .review-box {
        background: #334155;
        padding: 10px;
        margin: 10px 0;
        border-radius: 6px;
      }
    </style>
  </head>

  <body>
    <div class="header">🧠 CBT Examination System</div>
    <div class="timer-bar">
      ⏱ Exam Time Left: <span id="examTimer">--</span>
    </div>

    <div class="container">
      <div id="questions-container" class="card">Loading questions...</div>
    </div>

    <script>
      let currentQuestionIndex = 0;
      let userAnswers = {};
      let timerInterval;
      let examTimerInterval;
      let timeLeft = 60;
      let examTime = 1800;
      let allQuestions = [];

      function getExamAnswerKey(examData) {
        return `cbt_${examData.subject}_${examData.year}`;
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const examData = JSON.parse(localStorage.getItem("examData"));

        if (!examData) {
          alert("No exam selected");
          window.location.href = "exam-setup.html";
          return;
        }

        const answerKey = getExamAnswerKey(examData);
        userAnswers = JSON.parse(localStorage.getItem(answerKey) || "{}");

        const db = supabase.createClient(
          "https://bjfhmvvupkapplnbrukz.supabase.co",
          "sb_publishable_RxNzh9HL5UPhazJDk6BL9w_aJtZLBAP",
        );

        const { data } = await db.from("questions").select("*");

        allQuestions = data.map((q) => ({
          ...q,
          correct_answer: normalizeAnswer(q),
        }));

        renderQuestion();
        startExamTimer();

        setInterval(() => {
          localStorage.setItem(answerKey, JSON.stringify(userAnswers));
        }, 5000);
      });

      function normalizeAnswer(q) {
        const val = String(q.correct_answer || "")
          .trim()
          .toUpperCase();
        if (["A", "B", "C", "D"].includes(val)) return val;

        if (q.correct_answer === q.option_a) return "A";
        if (q.correct_answer === q.option_b) return "B";
        if (q.correct_answer === q.option_c) return "C";
        if (q.correct_answer === q.option_d) return "D";

        return "";
      }

      function renderNavGrid() {
        return `
    <div class="nav-grid">
      ${allQuestions
        .map((_, i) => {
          const bg = userAnswers[i] ? "#22c55e" : "#475569";
          return `<button style="background:${bg}" onclick="goTo(${i})">${i + 1}</button>`;
        })
        .join("")}
    </div>
  `;
      }

      function renderQuestion() {
        const q = allQuestions[currentQuestionIndex];

        document.getElementById("questions-container").innerHTML = `
    ${renderNavGrid()}

    <div class="question">
      <b>Q${currentQuestionIndex + 1}:</b> ${q.question_text}
    </div>

    ${renderOption("A", q.option_a)}
    ${renderOption("B", q.option_b)}
    ${renderOption("C", q.option_c)}
    ${renderOption("D", q.option_d)}

    <p>⏱ Question Time: <span id="timer">${timeLeft}</span>s</p>

    <div class="controls">
      <button onclick="prev()">⬅ Prev</button>
      <button onclick="next()">Next ➡</button>
      <button onclick="submitExam()">Submit</button>
    </div>
  `;

        restore();
        startTimer();
      }

      function renderOption(letter, text) {
        return `
    <label class="option">
      <input type="radio" name="opt" value="${letter}">
      ${letter}. ${text}
    </label>
  `;
      }

      document.addEventListener("change", (e) => {
        if (e.target.name === "opt") {
          userAnswers[currentQuestionIndex] = e.target.value;
        }
      });

      function restore() {
        const val = userAnswers[currentQuestionIndex];
        if (val) {
          const el = document.querySelector(`input[value="${val}"]`);
          if (el) el.checked = true;
        }
      }

      function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 60;

        timerInterval = setInterval(() => {
          timeLeft--;
          document.getElementById("timer").textContent = timeLeft;

          if (timeLeft <= 0) next();
        }, 1000);
      }

      function startExamTimer() {
        examTimerInterval = setInterval(() => {
          examTime--;
          const m = Math.floor(examTime / 60);
          const s = examTime % 60;
          document.getElementById("examTimer").textContent =
            `${m}:${s < 10 ? "0" : ""}${s}`;

          if (examTime <= 0) submitExam();
        }, 1000);
      }

      function next() {
        clearInterval(timerInterval);
        if (currentQuestionIndex < allQuestions.length - 1) {
          currentQuestionIndex++;
          renderQuestion();
        } else {
          submitExam();
        }
      }

      function prev() {
        clearInterval(timerInterval);
        if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          renderQuestion();
        }
      }

      function goTo(i) {
        clearInterval(timerInterval);
        currentQuestionIndex = i;
        renderQuestion();
      }

      function submitExam() {
        clearInterval(timerInterval);
        clearInterval(examTimerInterval);

        let score = 0;
        let review = "";

        allQuestions.forEach((q, i) => {
          const user = (userAnswers[i] || "").toUpperCase();
          const correct = q.correct_answer;

          const userText = q["option_" + user.toLowerCase()] || "No Answer";
          const correctText = q["option_" + correct.toLowerCase()];

          const ok = user === correct;
          if (ok) score++;

          review += `
      <div class="review-box">
        <p><b>Q${i + 1}:</b> ${q.question_text}</p>
        <p>Your Answer: <span style="color:${ok ? "#22c55e" : "#ef4444"}">${userText}</span></p>
        <p>Correct Answer: <span style="color:#22c55e">${correctText}</span></p>
      </div>
    `;
        });

        const percent = Math.round((score / allQuestions.length) * 100);

        document.getElementById("questions-container").innerHTML = `
    <h2>✅ Exam Submitted</h2>
    <h3>${score} / ${allQuestions.length}</h3>
    <h1>${percent}%</h1>
    <hr>
    <h3>📊 Review</h3>
    ${review}
  `;

        localStorage.removeItem("examData");
      }
    </script>
  </body>
</html>
